name: Publish GitHub release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: splitbill-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged revision
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify tag matches package version
        id: version
        shell: bash
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use the vMAJOR.MINOR.PATCH format."
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          if [[ "$GITHUB_REF_NAME" != "v$package_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v$package_version."
            exit 1
          fi

          echo "package_version=$package_version" >> "$GITHUB_OUTPUT"

      - name: Prepare release notes from changelog
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: |
          awk -v header="## [$PACKAGE_VERSION]" '
            index($0, header) == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
            END { if (!found) exit 1 }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "CHANGELOG.md has no notes for $PACKAGE_VERSION."
            exit 1
          fi

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Tally $GITHUB_REF_NAME"
          release_flags=()

          if [[ "$GITHUB_REF_NAME" == v0.* ]]; then
            title="$title — Public Beta"
            release_flags+=(--prerelease)
          fi

          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$title" \
            --notes-file release-notes.md \
            "${release_flags[@]}"
