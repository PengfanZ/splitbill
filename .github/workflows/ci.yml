name: CI and deployment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check every TypeScript file
        run: npm run typecheck

      - name: Lint TypeScript and React
        run: npm run lint

      - name: Run happy-path and edge-case tests with full coverage
        run: npm run test:coverage

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps --only-shell chromium

      - name: Run browser integration tests against the GitHub Pages build
        run: npm run test:e2e

      - name: Upload Playwright failure report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Configure GitHub Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
