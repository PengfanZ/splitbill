name: Bug report
description: Report a reproducible problem in Tally
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Tally. Please avoid including private expense data in the report.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior you observed.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Create an activity...
        2. Add an expense...
        3. See the unexpected result...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: Chrome 128 on macOS, Safari on iPhone, etc.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots or console errors after removing private data.
